name: svare-verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify required repository files exist
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          required_paths = [
              "README.md",
              "LICENSE",
              "demo/svare_v8_1.py",
              "demo/SVARE_HTML_v8_1.html",
              "concept_demo/SVARE_Deterministic_Structural_Cinema_v8_8.py",
              "docs/Quickstart.md",
              "docs/FAQ.md",
              "docs/Proof-Sketch.md",
              "docs/SVARE-Architecture-Notes.md",
              "docs/SVARE-Challenge.md",
              "docs/SVARE_v.1.3.pdf",
              "docs/SVARE_Diagram.png",
              "docs/Dependency-Elimination-Framework.png",
              "docs/Shunyaya-Structural-Stack.png",
              "VERIFY/VERIFY.txt",
              "VERIFY/FREEZE_DEMO_SHA256.txt",
          ]

          missing = [p for p in required_paths if not Path(p).exists()]
          if missing:
              print("ERROR: Missing required repository files:")
              for p in missing:
                  print(" -", p)
              sys.exit(1)

          print("Required repository files verified.")
          PY

      - name: Verify frozen SHA256 hashes
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import re
          import sys
          from pathlib import Path

          freeze_path = Path("VERIFY/FREEZE_DEMO_SHA256.txt")

          targets = {
              "demo/svare_v8_1.py": Path("demo/svare_v8_1.py"),
              "demo/SVARE_HTML_v8_1.html": Path("demo/SVARE_HTML_v8_1.html"),
          }

          freeze_text = freeze_path.read_text(encoding="utf-8")

          def sha256_file(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          checked = 0

          for label, path in targets.items():
              label_variants = [
                  re.escape(label),
                  re.escape(label.replace("/", "\\")),
              ]

              pattern = rf"({'|'.join(label_variants)})\s*SHA256:\s*([0-9a-f]{{64}})"
              match = re.search(pattern, freeze_text, re.IGNORECASE)

              if not match:
                  print(f"ERROR: No frozen SHA256 entry found for {label}.")
                  sys.exit(1)

              expected = match.group(2).lower()
              actual = sha256_file(path).lower()

              if actual != expected:
                  print(f"ERROR: Hash mismatch for {label}")
                  print("Expected:", expected)
                  print("Actual:  ", actual)
                  sys.exit(1)

              print(f"Hash verified for {label}: {actual}")
              checked += 1

          if checked != len(targets):
              print("ERROR: Not all frozen demo hashes were checked.")
              sys.exit(1)

          print("Frozen SHA256 verification completed.")
          PY

      - name: Run SVARE Python demo
        shell: bash
        run: |
          python demo/svare_v8_1.py

      - name: Verify SVARE output markers
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys

          cmd = [sys.executable, "demo/svare_v8_1.py"]
          result = subprocess.run(cmd, capture_output=True, text=True, check=True)
          out = result.stdout

          required_markers = [
              "SVARE v8.1",
              "Structural Value Resolution Engine",
              "value_visible iff structure_uniquely_resolves",
              "Resolution state",
              "RESOLVED",
              "FORBIDDEN",
              "INDETERMINATE_ZERO",
              "FINAL VISIBLE VALUE",
              "Certificate",
          ]

          missing = [marker for marker in required_markers if marker not in out]
          if missing:
              print("ERROR: SVARE output missing expected markers:")
              for marker in missing:
                  print(" -", marker)
              print("\nFull output:\n")
              print(out)
              sys.exit(1)

          print("SVARE output markers verified.")
          PY

      - name: Verify deterministic single-input output
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys

          cmd = [sys.executable, "demo/svare_v8_1.py", "5 + 2"]

          result1 = subprocess.run(cmd, capture_output=True, text=True, check=True)
          result2 = subprocess.run(cmd, capture_output=True, text=True, check=True)

          if result1.stdout != result2.stdout:
              print("ERROR: Non-deterministic SVARE output for identical input")
              sys.exit(1)

          required = [
              "Surface expression",
              "5 + 2",
              "Resolution state",
              "RESOLVED",
              "Visible value",
              "7",
              "Certificate",
          ]

          missing = [m for m in required if m not in result1.stdout]
          if missing:
              print("ERROR: Deterministic test output missing expected markers:")
              for m in missing:
                  print(" -", m)
              print(result1.stdout)
              sys.exit(1)

          print("Deterministic single-input output verified.")
          PY

      - name: Verify SVARE edge states
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys

          cases = {
              "9 / 0": "FORBIDDEN",
              "0 / 0": "INDETERMINATE_ZERO",
              "2 / 3 depth 8": "RESOLVED",
          }

          for expr, marker in cases.items():
              cmd = [sys.executable, "demo/svare_v8_1.py", expr]
              result = subprocess.run(cmd, capture_output=True, text=True, check=True)
              out = result.stdout

              if marker not in out:
                  print(f"ERROR: Expected marker {marker} not found for input: {expr}")
                  print(out)
                  sys.exit(1)

              print(f"Verified {expr}: {marker}")

          print("SVARE edge states verified.")
          PY

      - name: Verify HTML demo contains expected structural hooks
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          text = Path("demo/SVARE_HTML_v8_1.html").read_text(encoding="utf-8")

          required_snippets = [
              "SVARE",
              "Structural Value Resolution",
              "value_visible iff structure_uniquely_resolves",
              "RESOLVED",
              "INCOMPLETE",
              "CONFLICT",
              "FORBIDDEN",
              "INDETERMINATE_ZERO",
          ]

          missing = [snippet for snippet in required_snippets if snippet not in text]
          if missing:
              print("ERROR: HTML demo is missing expected structural hooks:")
              for snippet in missing:
                  print(" -", snippet)
              sys.exit(1)

          print("HTML demo structural hooks verified.")
          PY

      - name: Verify README contains current SVARE claims
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          text = Path("README.md").read_text(encoding="utf-8")

          required_snippets = [
              "Structural Value Resolution Engine",
              "Correctness Without Computation",
              "value_visible iff structure_uniquely_resolves",
              "structure_uniquely_resolves = complete AND consistent",
              "value_visibility = resolve(structure)",
              "Computation may reveal value",
              "It does not create or determine correctness",
              "SVARE Challenge",
              "demo/svare_v8_1.py",
              "VERIFY/FREEZE_DEMO_SHA256.txt",
          ]

          missing = [snippet for snippet in required_snippets if snippet not in text]
          if missing:
              print("ERROR: README.md is missing expected SVARE claims:")
              for snippet in missing:
                  print(" -", snippet)
              sys.exit(1)

          print("README core claims verified.")
          PY
