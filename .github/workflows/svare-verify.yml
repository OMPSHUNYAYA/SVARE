name: svare-verify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: svare-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify required repository files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          required_paths = [
              ".github/workflows/svare-verify.yml",
              "README.md",
              "LICENSE",
              "demo_extension_v10_0_6/SVARE_v10_0_6.py",
              "demo_extension_v10_0_6/SVARE_v10_0_6.html",
              "demo_extension_v10_0_6/SVARE_v10_0_6_vectors.json",
              "demo_extension_v10_0_6/SVARE_v10_0_6_validation.json",
              "archive/concept_demo/SVARE_Deterministic_Structural_Cinema_v8_8.py",
              "archive/demo/svare_v8_1.py",
              "archive/demo/SVARE_HTML_v8_1.html",
              "archive/demo_extension/svare_v9_9.py",
              "archive/demo_extension/SVARE_HTML_v9_9.html",
              "docs/Quickstart.md",
              "docs/FAQ.md",
              "docs/Proof-Sketch.md",
              "docs/SVARE-Architecture-Notes.md",
              "docs/SVARE-Challenge.md",
              "docs/SVARE_Diagram.png",
              "docs/Dependency-Elimination-Framework.png",
              "docs/Shunyaya-Structural-Stack.png",
              "VERIFY/VERIFY.txt",
              "VERIFY/FREEZE_DEMO_SHA256.txt",
          ]

          missing = [path for path in required_paths if not Path(path).is_file()]
          if missing:
              print("ERROR: Missing required repository files:")
              for path in missing:
                  print(" -", path)
              sys.exit(1)

          print(f"Verified {len(required_paths)} required repository files.")
          PY

      - name: Verify current release SHA-256 fingerprints
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import re
          import sys

          freeze_path = Path("VERIFY/FREEZE_DEMO_SHA256.txt")
          freeze_text = freeze_path.read_text(encoding="utf-8").replace("\\", "/")

          targets = [
              "demo_extension_v10_0_6/SVARE_v10_0_6.py",
              "demo_extension_v10_0_6/SVARE_v10_0_6.html",
              "demo_extension_v10_0_6/SVARE_v10_0_6_vectors.json",
              "demo_extension_v10_0_6/SVARE_v10_0_6_validation.json",
          ]

          def sha256_file(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          for target in targets:
              pattern = re.compile(
                  re.escape(target) + r"\s+SHA-256:\s*([0-9a-fA-F]{64})",
                  re.IGNORECASE,
              )
              match = pattern.search(freeze_text)

              if not match:
                  print(f"ERROR: No frozen SHA-256 entry found for {target}.")
                  sys.exit(1)

              expected = match.group(1).lower()
              actual = sha256_file(Path(target)).lower()

              if actual != expected:
                  print(f"ERROR: SHA-256 mismatch for {target}")
                  print("Expected:", expected)
                  print("Actual:  ", actual)
                  sys.exit(1)

              print(f"Verified {target}: {actual}")

          print("All current release SHA-256 fingerprints verified.")
          PY

      - name: Compile Python reference engine
        shell: bash
        run: |
          python -m py_compile demo_extension_v10_0_6/SVARE_v10_0_6.py

      - name: Validate release JSON files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import sys

          vectors_path = Path("demo_extension_v10_0_6/SVARE_v10_0_6_vectors.json")
          validation_path = Path("demo_extension_v10_0_6/SVARE_v10_0_6_validation.json")

          vectors = json.loads(vectors_path.read_text(encoding="utf-8"))
          validation = json.loads(validation_path.read_text(encoding="utf-8"))

          expected_hash = "76e1fff4dee7fe2361d5d2a869f589e6f413049df3cf394544e371669fb48f69"

          checks = [
              (vectors.get("schema_version") == "2", "vector schema version"),
              (vectors.get("release_version") == "10.0.6", "vector release version"),
              (vectors.get("conformance_vector_sha256") == expected_hash, "vector payload hash"),
              (len(vectors.get("vectors", [])) == 59, "shared vector count"),
              (validation.get("version") == "10.0.6", "validation release version"),
              (validation.get("conformance_vector_sha256") == expected_hash, "validation vector hash"),
              (validation.get("python_self_test", {}).get("case_count") == 63, "Python check count"),
              (validation.get("python_self_test", {}).get("failure_count") == 0, "Python failure count"),
              (validation.get("python_self_test", {}).get("all_pass") is True, "Python all-pass flag"),
              (validation.get("html_self_test", {}).get("case_count") == 63, "HTML check count"),
              (validation.get("html_self_test", {}).get("failure_count") == 0, "HTML failure count"),
              (validation.get("html_self_test", {}).get("all_pass") is True, "HTML all-pass flag"),
              (
                  validation.get("differential_validation", {}).get("expression_count") == 97,
                  "differential expression count",
              ),
              (
                  validation.get("differential_validation", {}).get("mismatch_count") == 0,
                  "differential mismatch count",
              ),
              (validation.get("browser_page_errors") == [], "browser page errors"),
          ]

          failed = [label for passed, label in checks if not passed]
          if failed:
              print("ERROR: Release JSON validation failed:")
              for label in failed:
                  print(" -", label)
              sys.exit(1)

          print("Release JSON records verified.")
          PY

      - name: Run SVARE v10.0.6 self-test
        shell: bash
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          script = "demo_extension_v10_0_6/SVARE_v10_0_6.py"
          expected_hash = "76e1fff4dee7fe2361d5d2a869f589e6f413049df3cf394544e371669fb48f69"

          result = subprocess.run(
              [sys.executable, script, "--self-test"],
              capture_output=True,
              text=True,
          )

          if result.returncode != 0:
              print(result.stdout)
              print(result.stderr)
              sys.exit(result.returncode)

          try:
              report = json.loads(result.stdout)
          except json.JSONDecodeError:
              print("ERROR: Self-test output was not valid JSON.")
              print(result.stdout)
              sys.exit(1)

          expected = {
              "version": "10.0.6",
              "case_count": 63,
              "failure_count": 0,
              "all_pass": True,
              "external_vectors_checked": True,
              "conformance_vector_sha256": expected_hash,
          }

          failures = [
              f"{key}: expected {value!r}, received {report.get(key)!r}"
              for key, value in expected.items()
              if report.get(key) != value
          ]

          if failures:
              print("ERROR: Self-test report did not match the frozen release:")
              for failure in failures:
                  print(" -", failure)
              sys.exit(1)

          print("SVARE v10.0.6 self-test verified.")
          PY

      - name: Verify deterministic receipts and precision isolation
        shell: bash
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          script = "demo_extension_v10_0_6/SVARE_v10_0_6.py"

          def resolve(expression: str, precision=None) -> dict:
              command = [sys.executable, script]
              if precision is not None:
                  command.extend(["--precision", str(precision)])
              command.extend(["--json", expression])

              result = subprocess.run(command, capture_output=True, text=True)
              if result.returncode != 0:
                  print(result.stdout)
                  print(result.stderr)
                  raise SystemExit(result.returncode)

              return json.loads(result.stdout)

          first = resolve("sin(pi/6)")
          second = resolve("sin(pi/6)")

          deterministic_fields = [
              "state",
              "exact_value",
              "structure_canonical",
              "semantic_canonical",
              "structure_certificate_sha256",
              "semantic_certificate_sha256",
              "display_receipt_sha256",
          ]

          for field in deterministic_fields:
              if first.get(field) != second.get(field):
                  print(f"ERROR: Non-deterministic field: {field}")
                  sys.exit(1)

          p30 = resolve("sqrt(2)", 30)
          p60 = resolve("sqrt(2)", 60)

          invariant_fields = [
              "state",
              "exact_value",
              "structure_canonical",
              "semantic_canonical",
              "structure_certificate_sha256",
              "semantic_certificate_sha256",
          ]

          for field in invariant_fields:
              if p30.get(field) != p60.get(field):
                  print(f"ERROR: Precision changed invariant field: {field}")
                  sys.exit(1)

          if p30.get("display_value") == p60.get("display_value"):
              print("ERROR: Precision did not change the symbolic display.")
              sys.exit(1)

          if p30.get("display_receipt_sha256") == p60.get("display_receipt_sha256"):
              print("ERROR: Precision did not change the display receipt.")
              sys.exit(1)

          print("Deterministic receipts and precision isolation verified.")
          PY

      - name: Verify explicit states and exit codes
        shell: bash
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          script = "demo_extension_v10_0_6/SVARE_v10_0_6.py"

          cases = [
              ("tan(pi/2)", "SINGULAR", None),
              ("1/0", "FORBIDDEN", None),
              ("0/0", "INDETERMINATE", None),
              ("(1+2", "INCOMPLETE", None),
              ("atan(1,2)", "CONFLICT", None),
              ("unknown_function(2)", "ABSTAIN", None),
              ("١+١", "CONFLICT", "UNSUPPORTED_CHARACTER"),
              ("2^2^2^2^2^2", "LIMIT_EXCEEDED", "MAX_EXACT_RESULT_DIGITS"),
          ]

          for expression, expected_state, expected_error in cases:
              result = subprocess.run(
                  [sys.executable, script, "--json", expression],
                  capture_output=True,
                  text=True,
              )

              if result.returncode != 2:
                  print(
                      f"ERROR: Expected exit code 2 for {expression!r}; "
                      f"received {result.returncode}."
                  )
                  print(result.stdout)
                  print(result.stderr)
                  sys.exit(1)

              try:
                  report = json.loads(result.stdout)
              except json.JSONDecodeError:
                  print(f"ERROR: Output for {expression!r} was not valid JSON.")
                  print(result.stdout)
                  sys.exit(1)

              if report.get("state") != expected_state:
                  print(
                      f"ERROR: {expression!r} expected state {expected_state}; "
                      f"received {report.get('state')}."
                  )
                  sys.exit(1)

              if expected_error is not None and report.get("error_code") != expected_error:
                  print(
                      f"ERROR: {expression!r} expected error code {expected_error}; "
                      f"received {report.get('error_code')}."
                  )
                  sys.exit(1)

              if report.get("exact_value") is not None:
                  print(f"ERROR: Non-resolved expression {expression!r} exposed an exact value.")
                  sys.exit(1)

              print(f"Verified {expression!r}: {expected_state}")

          print("Explicit states and exit codes verified.")
          PY

      - name: Verify HTML release markers
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          html = Path(
              "demo_extension_v10_0_6/SVARE_v10_0_6.html"
          ).read_text(encoding="utf-8")

          required_markers = [
              "SVARE v10.0.6",
              "Exact and Scientific Resolution",
              "standalone browser release",
              "76e1fff4dee7fe2361d5d2a869f589e6f413049df3cf394544e371669fb48f69",
              "RESOLVED_EXACT_RATIONAL",
              "RESOLVED_EXACT_SYMBOLIC",
              "SINGULAR",
              "FORBIDDEN",
              "INDETERMINATE",
              "INCOMPLETE",
              "CONFLICT",
              "ABSTAIN",
              "LIMIT_EXCEEDED",
              "INTERNAL_ERROR",
          ]

          missing = [marker for marker in required_markers if marker not in html]
          if missing:
              print("ERROR: HTML release is missing required markers:")
              for marker in missing:
                  print(" -", marker)
              sys.exit(1)

          print("HTML release markers verified.")
          PY
